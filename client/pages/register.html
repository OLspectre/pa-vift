<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>


    <main class="container">
        <header>
            <h1>PÅ VIFT</h1>
            <h4>Registrera ditt lag!</h4>
        </header>

        <section #form>
            <p id="createTeamP">Skapa lagnamn & fyll i lösenord</p>
            <input type="text" alt="Lagnamn" id="inputTeamName" placeholder="Ex: Ninja Turtles">
            <input type="password" id="inputPassword" placeholder="Ange hemliga koden...">
            <p id="errorText"></p>
        </section>

        <button id="registerBtn" class="linkBTN">Registrera</button>
    </main>

    <script src="../js/register.js" type="module"></script>
</body>

</html>
