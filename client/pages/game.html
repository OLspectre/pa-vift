<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/game.css">
</head>

<body>
    <img id="gameBackground" src="../media/gameBackground.svg" alt="">
    <main id="pageMain" class="container">
        <section id="timerAndButtonsContainer">
            <h2 id="timer"></h2>
            <div id="buttonContainer">
                <button class="selected" id="partClueBtn">Delmål</button>
                <button id="endClueBtn">Slutmål</button>
            </div>
            <button id="finishBtn" type="button">FINISH</button>

        </section>

        <section id="destinationCardContainer">
            <div class="card">
                <h3>Destination 1</h3>
                <p>“Den gyllene måsen är nära till hands och tittar ut över vattnet”</p>
                <button id="mapBtn" class="linkBTN">Karta</button>
            </div>
            <button id="guessPartBtn" class="linkBTN">Svara</button>
        </section>



        <section id="endCardContainer">
            <div class="card">
                <div id="pointContainer">
                    <p>100</p>
                    <img src="../media/el_star-alt.svg" alt="point(s)">
                </div>
                <h3>Ledtråd</h3>
                <p>“Erik vid havet tänker på den nya födelsen i hans gård av pengar.”</p>
            </div>
            <button id="guessEndBtn" class="linkBTN">Svara</button>
        </section>
    </main>
    <div class="overlay-popup">
        <main id="popupMain" class="container">
            <!-- <div id="warningDiv"> <span>VARNING</span> Fel gissning låser svarsknappen för huvudgåtan i 5
                minuter.</div> -->
            <div class="answer-card">
                <img class="close-popup" src="../media/close svg.svg" alt="X to close popup">
                <div class="titleAndInput-container">
                    <h4>Lösning på gåtan</h4>
                    <input type="text">
                    <div id="warningDiv">
                        Fel gissning låser svarsknappen för huvudgåtan i <span>5 minuter</span>
                    </div>
                </div>

                <button class="linkBTN inactive ">Bekräfta</button>
            </div>
        </main>
    </div>

    <script type="module" src="../js/game.js"></script>
    <script type="module" src="../js/gameLogic.js"></script>
</body>

</html>
